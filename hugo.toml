baseURL = 'https://wuwenbin.top/'  # 请务必替换为您的真实域名 
languageCode = 'zh-cn'
title = '幸福的文彬'              # 替换为您的博客名称
theme = 'PaperMod'

# 分页设置（替代旧版 paginate 参数）
[pagination]
  pagersSize = 5

# 主题参数
[params]
  defaultTheme = 'light'           # 默认主题：light, dark, auto
  # 网站描述
  description = '记录生活，分享思考'
  # 网站关键词
  keywords = ['博客', '日记', '思考', '随笔']

  # 启用功能
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true

  # 归档页设置（显示所有文章，不分页）
  [params.archive]
    pagersSize = 0

  # 主页显示的文章区域
  mainSections = ['posts']

  # 社交链接 (示例，按需修改)
  [params.social]
    GitHub = 'https://github.com/yourusername'
    Twitter = 'https://twitter.com/yourusername'

  # 主页个人信息区域（可放微信二维码）
  [params.profile]
    enabled = true
    title = "文彬"
    image = "images/avatar.jpg"  # 头像，放入 assets/images/
    imageWidth = 150
    imageHeight = 150
    description = """
    随便写写 欢迎交流<br>
    您可以在这里放置微信二维码的描述或直接放二维码图片。
    """
    # 如果您想在描述下方直接放微信二维码图片，可以这样写：
    # description = """
    # <img src="/images/wechat-qr.jpg" alt="微信二维码" width="150"><br>
    # 扫码加我微信
    # """

# 菜单配置
[menu]
  [[menu.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 10

  [[menu.main]]
    identifier = 'archives'
    name = '归档'
    url = '/archives/'
    weight = 20

  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 30

# 分类和标签（如果您需要的话）
[taxonomies]
  category = 'categories'
  tag = 'tags'